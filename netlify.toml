[build]
  publish = "."

# Static files take priority over edge functions for SEO-critical files
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# Contact form page
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# Contractors landing page
[[redirects]]
  from = "/contractors"
  to = "/contractors.html"
  status = 200

